services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docs_app
    restart: unless-stopped
    volumes:
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    networks:
      - docs_network
    depends_on:
      - db
    env_file:
      - .env

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docs_queue
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    volumes:
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    networks:
      - docs_network
    depends_on:
      - db
    env_file:
      - .env

  web:
    image: nginx:alpine
    container_name: docs_web
    restart: unless-stopped
    ports:
      - "8181:80"
    volumes:
      - ./public:/var/www/public
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - docs_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: docs_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - docs_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: docs_phpmyadmin
    restart: unless-stopped
    ports:
      - "9090:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    networks:
      - docs_network
    depends_on:
      - db

networks:
  docs_network:
    driver: bridge

volumes:
  db_data:
    driver: local
